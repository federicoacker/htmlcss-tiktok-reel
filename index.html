<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bool Tok</title>
  <link rel="icon" href="assets/img/booltok_logo.png">


  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">


  <!-- TikTok Sans -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=TikTok+Sans:opsz,wght@12..36,300..900&display=swap"
    rel="stylesheet">

  <!-- Stylesheet -->
  <link rel="stylesheet" href="css/style.css">

</head>

<body>
  <!-- Container della pagina, necessario per via del layout particolare -->
  <div class="reel-page ">
    <video src="assets/video/coder.mp4" autoplay muted loop></video>

    <!-- Header -->
    <header class="reel-header">
      <div class="header-icon">
        <i class="bi bi-play-btn"></i>
      </div>
      <nav class="header-nav-container">
        <a class="reel-header-nav-item nav-item-1" href="#">Esplora</a>
        <a class="reel-header-nav-item nav-item-2" href="#">Seguiti</a>
        <a class="reel-header-nav-item nav-item-3" href="#">Per te</a>
      </nav>
      <div class="header-icon">
        <i class="bi bi-search"></i>
      </div>
    </header>

    <!-- Sidebar -->
    <main>
      <div class="sidebar">
        <div class="sidebar-item profile">
          <img class="profile-image" src="./assets/img/boolean_logo.png" alt="Immagine Profilo">
          <i class="bi bi-plus-circle-fill plus-sign"></i>
        </div>
        <div class="sidebar-item like">
          <i class="bi bi-heart-fill"></i>
          <div class="sidebar-number">588</div>
        </div>
        <div class="sidebar-item chat">
          <i class="bi bi-chat-dots-fill"></i>
          <div class="sidebar-number">13</div>
        </div>
        <div class="sidebar-item bookmark">
          <i class="bi bi-bookmark-fill"></i>
          <div class="sidebar-number">638</div>
        </div>
        <div class="sidebar-item repost">
          <i class="bi bi-sign-turn-slight-right-fill"></i>
          <div class="sidebar-number">491</div>
        </div>
      </div>

      <div class="video-description">
        <h3 class="video-description-title">boolean.careers</h3>
        <p class="video-description-text">Prova il Fundamentals Camp. 20 ore di corso 
          gratuito per... Vedi altro</p>
      </div>
    </main>

    <!-- Footer -->
    <footer>
      <div class="footer-button-container">
        <button class="footer-button home-btn">
          <div class="footer-button-label home-btn-lbl">Home</div>
        </button>
        <button class="footer-button friends-btn">
          <div class="footer-button-label friends-btn-lbl">Amici</div>
        </button>
        <button class="footer-button main-btn">
          +
        </button>
        <button class="footer-button messages-btn">
          <div class="footer-button-label messages-btn-lbl">
            Posta in arrivo
            <div class="messages-notifications">19</div>
          </div>

        </button>
        <button class="footer-button profile-btn">
          <div class="footer-button-label profile-btn-lbl">Profilo</div>
        </button>
      </div>
    </footer>
  </div>

</body>

</html>
